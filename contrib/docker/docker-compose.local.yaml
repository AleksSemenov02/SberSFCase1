services:
  minio:
    image: minio/minio:latest
    volumes:
      - minio_storage:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: root
      MINIO_ROOT_PASSWORD: qwertyui
    command: server /data --console-address ":9001"

  db:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: case1
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql

  app_api:
    build:
      context: ../../
      dockerfile: contrib/docker/app_api/Dockerfile
    command: "fastapi dev --host 0.0.0.0 --port 8000 -e app.api:app"
    env_file: ../../.env
    ports:
      - "8000:8000"
    volumes:
      - ../../:/app

  migrations:
    depends_on:
      - db
    build:
      context: ../../
      dockerfile: contrib/docker/app_api/Dockerfile
    command: "alembic -c database/migrations/alembic.ini upgrade head"
    env_file: ../../.env
    volumes:
      - ../../:/app

  tests:
    build:
      context: ../../
      dockerfile: contrib/docker/app_api/Dockerfile
    command: "pytest tests/ -v"
    env_file: ../../.env
    volumes:
      - ../../:/app


volumes:
  pg_data:
  minio_storage: